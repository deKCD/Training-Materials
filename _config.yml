title: Collection of Training Materials
description: |
  Collection of GTN compatible de.KCD / de.NBI Cloud training materials and learning pathways
theme: jekyll-theme-cayman
color_mode:
  enable: true
  switch: true
  default: light
  
# Sites
url: "https://dekcd.bi.denbi.de"
baseurl: "/training"
repository_url: "https://github.com/deKCD/Training-Materials"
dekcd: "https://datenkompetenz.cloud/"
dekcd_training: "https://datenkompetenz.cloud/training/"
denbi_cloud: "https://www.denbi.de/cloud"
partner: "https://datenkompetenz.cloud/partner/"
event_kalender: "https://datenkompetenz.cloud/event-kalender/?p=1"
frag_unsere_experten: "https://datenkompetenz.cloud/frag-unsere-experten/"
cc_by_human: "https://creativecommons.org/licenses/by/4.0/"
email: "info@datenkompetenz.cloud"

# Directory setup
collections:
  tutorials:
    output: true
    permalink: /tutorials/:path/
  pathways:
    output: true
  slides:
    output: true

includes_dir: .

# Turn on built-in syntax highlighting.
highlighter: rouge

exclude:
  - "**/.ipynb_checkpoints"
  - "**/.ipynb_checkpoints/**"

plugins:
  - jekyll-last-modified-at
  - jekyll-sitemap
  
categories:
  tutorials: "/tutorials/"
  pathways: "/pathways/"
  contribution: CONTRIBUTING.md
  faq: FAQ.md
  contact_email: "info@datenkompetenz.cloud"  